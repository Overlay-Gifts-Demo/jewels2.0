<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JEWELS-AI | Premium Virtual Try-On</title>
  
  <link rel="stylesheet" href="style.css" />

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    :root {
      --gold: #D4AF37;
      --glass-dark: rgba(0, 0, 0, 0.7);
      --blur: blur(15px);
    }

    body, html {
      margin: 0; padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #000; color: white;
      overflow: hidden; height: 100%;
    }

    #video-container { position: fixed; inset: 0; z-index: 0; }
    #webcam, #overlay, #remote-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    #webcam { transform: scaleX(-1); }

    header { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 20; }
    .brand {
      font-size: 1.2rem; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; color: var(--gold);
      background: var(--glass-dark); padding: 10px 30px; border-radius: 50px; backdrop-filter: var(--blur);
      border: 1px solid rgba(212, 175, 55, 0.3);
    }

    #jewelry-options {
      position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 600px; display: flex; overflow-x: auto; gap: 15px; padding: 15px;
      z-index: 15; scrollbar-width: none;
    }
    #jewelry-options::-webkit-scrollbar { display: none; }

    #dock {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--glass-dark); backdrop-filter: var(--blur);
      display: flex; padding: 8px; border-radius: 100px; z-index: 20;
    }

    .cat { padding: 12px 25px; border-radius: 100px; cursor: pointer; font-size: 13px; text-transform: uppercase; }
    .cat.active { background: var(--gold); color: black; font-weight: bold; }

    .snap-btn {
      background: white; border: none; border-radius: 50px; padding: 10px 20px;
      margin-left: 10px; cursor: pointer; font-size: 18px;
    }

    /* PREVIEW MODAL */
    #preview-modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98);
      z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
    }
    .preview-box { width: 100%; max-width: 500px; text-align: center; position: relative; }
    #preview-image { width: 100%; border-radius: 15px; border: 2px solid var(--gold); margin-bottom: 20px; }
    
    .preview-actions { display: flex; gap: 10px; width: 100%; }
    .action-btn {
      flex: 1; padding: 15px; border: none; border-radius: 10px;
      font-weight: bold; cursor: pointer; font-size: 15px;
    }
    .btn-download { background: var(--gold); color: black; }
    .btn-whatsapp { background: #25D366; color: white; }
    .close-preview { position: absolute; top: -50px; right: 0; color: white; font-size: 40px; cursor: pointer; }

    #flash-overlay { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 999; }
  </style>
</head>
<body>

  <div id="app">
    <header><div class="brand">Jewels AI</div></header>
    <div id="flash-overlay"></div>
    
    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <video id="remote-video" autoplay playsinline></video>
    </div>

    <div id="jewelry-options"></div>

    <div id="dock">
      <div class="cat active" onclick="selectJewelryType('earrings', this)">Earrings</div>
      <div class="cat" onclick="selectJewelryType('chains', this)">Chains</div>
      <div class="cat" onclick="selectJewelryType('rings', this)">Rings</div>
      <div class="cat" onclick="selectJewelryType('bangles', this)">Bangles</div>
      <button class="snap-btn" onclick="captureSnapshot()">📸</button>
    </div>

    <div id="preview-modal">
      <div class="preview-box">
        <span class="close-preview" onclick="closePreview()">&times;</span>
        <img id="preview-image" src="">
        <div class="preview-actions">
          <button class="action-btn btn-download" onclick="downloadBakedImage()">📥 Download</button>
          <button class="action-btn btn-whatsapp" onclick="shareToWhatsApp()">🟢 WhatsApp</button>
        </div>
      </div>
    </div>
  </div>

  <script src="core.js"></script>
  <script>
    async function captureSnapshot() {
        // Flash
        const flash = document.getElementById('flash-overlay');
        flash.style.opacity = '1';
        setTimeout(() => flash.style.opacity = '0', 150);

        const video = document.getElementById('webcam');
        const overlay = document.getElementById('overlay');
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth || 1280;
        canvas.height = video.videoHeight || 720;

        // 1. Merge Layers
        ctx.save();
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();
        ctx.drawImage(overlay, 0, 0, canvas.width, canvas.height);

        // 2. Bake Description Box
        const fileName = window.currentJewelry ? window.currentJewelry.split('/').pop().split('.')[0] : "Jewels_AI_Selection";
        const boxH = 120;
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
        ctx.fillRect(0, canvas.height - boxH, canvas.width, boxH);
        ctx.strokeStyle = "#d4af37"; ctx.lineWidth = 4;
        ctx.strokeRect(0, canvas.height - boxH, canvas.width, boxH);

        ctx.fillStyle = "#d4af37"; ctx.font = "bold 30px Arial";
        ctx.fillText("Product Description", 30, canvas.height - 70);
        ctx.fillStyle = "white"; ctx.font = "24px Arial";
        ctx.fillText("Item: " + fileName, 30, canvas.height - 30);

        document.getElementById('preview-image').src = canvas.toDataURL("image/png");
        document.getElementById('preview-modal').style.display = 'flex';
    }

    function closePreview() { document.getElementById('preview-modal').style.display = 'none'; }

    function downloadBakedImage() {
        const link = document.createElement('a');
        link.download = "My_Jewels_AI_Look.png";
        link.href = document.getElementById('preview-image').src;
        link.click();
    }

    async function shareToWhatsApp() {
        const imgSource = document.getElementById('preview-image').src;
        const blob = await (await fetch(imgSource)).blob();
        const file = new File([blob], 'my_look.png', { type: 'image/png' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
                files: [file],
                title: 'Jewels AI',
                text: 'Check out my look!'
            });
        } else {
            window.open(`https://wa.me/919743600311?text=${encodeURIComponent("Check out my Jewels AI look!")}`, '_blank');
        }
    }
  </script>
</body>
</html>
