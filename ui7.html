<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>JEWELS-AI | High Contrast Liquid UI</title>
  
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    :root {
      --merc-gold: #FFD700;
      --glass-dark: rgba(0, 0, 0, 0.7);
    }

    body, html {
      margin: 0; padding: 0;
      background: #000;
      color: white; font-family: 'Inter', sans-serif;
      overflow: hidden; height: 100vh;
    }

    #video-container { position: fixed; inset: 0; z-index: 0; }
    video, canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    #webcam { transform: scaleX(-1); }

    /* SIDEBAR */
    #dock {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: 180px; 
      background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, transparent 100%);
      display: flex; flex-direction: column; justify-content: center;
      z-index: 100;
    }

    .cat {
      display: flex; align-items: center;
      padding: 20px 25px; cursor: pointer;
      transition: all 0.3s ease;
    }

    .cat span {
      margin-left: 15px; 
      font-size: 14px; 
      font-weight: 800;
      text-transform: uppercase; 
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.6);
    }

    .cat.active {
      background: var(--merc-gold);
      border-radius: 0 50px 50px 0;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
    }

    .cat.active span { color: #000 !important; }
    .cat.active .icon { filter: brightness(0); }

    /* SNAPSHOT BUTTON */
    .snap-btn-container {
      padding: 20px 25px;
    }
    .snap-btn {
      width: 60px; height: 60px; border-radius: 50%; background: white;
      border: 3px solid var(--merc-gold); cursor: pointer; font-size: 24px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    /* JEWELRY TRAY */
    #jewelry-options {
      position: fixed; bottom: 40px; left: 200px; right: 20px;
      height: 120px; display: flex; align-items: center;
      overflow-x: auto; gap: 20px; z-index: 90;
      scrollbar-width: none;
    }
    #jewelry-options::-webkit-scrollbar { display: none; }

    #jewelry-options img, .thumb-btn {
      min-width: 90px; height: 90px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);
      object-fit: contain; padding: 10px; cursor: pointer;
      transition: 0.3s;
    }

    /* PREVIEW MODAL */
    #preview-modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98);
      z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
    }
    #preview-image { max-width: 90%; max-height: 65%; border-radius: 15px; border: 2px solid var(--merc-gold); }
    
    .preview-actions { margin-top: 25px; display: flex; gap: 15px; width: 100%; max-width: 400px; }
    .preview-actions button {
      flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
    }
    .btn-dl { background: var(--merc-gold); color: black; }
    .btn-wa { background: #25D366; color: white; }
    .close-preview { position: absolute; top: 30px; right: 30px; font-size: 40px; cursor: pointer; }

    #flash-overlay { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 999; }
  </style>
</head>
<body>

  <div id="app">
    <div id="flash-overlay"></div>

    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <video id="remote-video" autoplay playsinline></video>
    </div>

    <div id="dock">
      <div class="cat active" onclick="handleCategory('earrings', this)">
          <span class="icon">💎</span><span>Earrings</span>
      </div>
      <div class="cat" onclick="handleCategory('chains', this)">
          <span class="icon">🔗</span><span>Chains</span>
      </div>
      <div class="cat" onclick="handleCategory('rings', this)">
          <span class="icon">💍</span><span>Rings</span>
      </div>
      <div class="cat" onclick="handleCategory('bangles', this)">
          <span class="icon">✨</span><span>Bangles</span>
      </div>
      <div class="snap-btn-container">
          <button class="snap-btn" onclick="captureSnapshot()">📸</button>
      </div>
    </div>

    <div id="jewelry-options"></div>

    <div id="preview-modal">
        <span class="close-preview" onclick="closePreview()">&times;</span>
        <img id="preview-image" src="">
        <div class="preview-actions">
            <button class="btn-dl" onclick="downloadBakedImage()">📥 DOWNLOAD</button>
            <button class="btn-wa" onclick="shareToWhatsApp()">🟢 WHATSAPP</button>
        </div>
    </div>
  </div>

  <script src="core.js"></script>

  <script>
    function handleCategory(type, element) {
        document.querySelectorAll('.cat').forEach(nav => nav.classList.remove('active'));
        element.classList.add('active');
        if (typeof selectJewelryType === "function") selectJewelryType(type);
    }

    // Capture, Merge Layers and Bake Description
    function captureSnapshot() {
        const flash = document.getElementById('flash-overlay');
        flash.style.opacity = '1';
        setTimeout(() => flash.style.opacity = '0', 150);

        const video = document.getElementById('webcam');
        const arLayer = document.getElementById('overlay');
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth || 1280;
        canvas.height = video.videoHeight || 720;

        // 1. Draw User (Mirrored)
        ctx.save();
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();

        // 2. Draw Jewelry
        ctx.drawImage(arLayer, 0, 0, canvas.width, canvas.height);

        // 3. Bake Description Bar
        const fileName = window.currentJewelry ? window.currentJewelry.split('/').pop().split('.')[0] : "Product_Selection";
        const boxH = 120;
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0, canvas.height - boxH, canvas.width, boxH);
        ctx.strokeStyle = "#FFD700"; ctx.lineWidth = 4;
        ctx.strokeRect(0, canvas.height - boxH, canvas.width, boxH);

        ctx.fillStyle = "#FFD700"; ctx.font = "bold 32px Arial";
        ctx.fillText("Product Description", 40, canvas.height - 70);
        ctx.fillStyle = "white"; ctx.font = "24px Arial";
        ctx.fillText("Item Code: " + fileName, 40, canvas.height - 30);

        document.getElementById('preview-image').src = canvas.toDataURL("image/png");
        document.getElementById('preview-modal').style.display = 'flex';
    }

    function closePreview() { document.getElementById('preview-modal').style.display = 'none'; }

    function downloadBakedImage() {
        const link = document.createElement('a');
        link.download = "My_Jewels_Look.png";
        link.href = document.getElementById('preview-image').src;
        link.click();
    }

    async function shareToWhatsApp() {
        const dataUrl = document.getElementById('preview-image').src;
        const blob = await (await fetch(dataUrl)).blob();
        const file = new File([blob], 'my_look.png', { type: 'image/png' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
                files: [file],
                title: 'Jewels AI',
                text: 'Check out my jewelry look! ✨'
            });
        } else {
            window.open(`https://wa.me/919743600311?text=${encodeURIComponent("Check out my Jewels AI look!")}`, '_blank');
        }
    }

    window.addEventListener('load', () => {
        setTimeout(() => {
            const activeBtn = document.querySelector('.cat.active');
            if (activeBtn) handleCategory('earrings', activeBtn);
        }, 1200);
    });
  </script>
</body>
</html>
