<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>JEWELS-AI | Gravity Well UI</title>
  
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    :root {
      --accent-gold: #FFD700;
      --deep-glass: rgba(0, 0, 0, 0.75);
    }

    body, html {
      margin: 0; padding: 0;
      background: #000; color: white;
      font-family: 'Montserrat', sans-serif;
      overflow: hidden; height: 100vh;
    }

    #video-container {
      position: fixed; inset: 0; z-index: 0;
    }
    video, canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

    /* UNIQUE: Floating Orb Navigation */
    #dock {
      position: fixed; 
      top: 40px; 
      left: 0; 
      width: 100%;
      display: flex; 
      justify-content: space-around; 
      align-items: center;
      z-index: 100;
      padding: 0 10px;
    }

    .cat {
      width: 75px; height: 75px;
      background: var(--deep-glass);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    .cat span {
      font-size: 9px; font-weight: 900;
      text-transform: uppercase; letter-spacing: 1px;
      margin-top: 4px; color: rgba(255,255,255,0.7);
    }

    /* Active Orb: Pulses and Grows */
    .cat.active {
      transform: scale(1.2);
      background: var(--accent-gold);
      border-color: #fff;
      animation: orbPulse 2s infinite;
    }

    .cat.active span { color: #000; }
    .cat.active .icon { filter: brightness(0); }

    @keyframes orbPulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
    }

    /* JEWELRY "WELL": Floating Curved Tray */
    #jewelry-options {
      position: fixed; 
      bottom: 50px; 
      left: 50%;
      transform: translateX(-50%);
      width: 95%;
      height: 150px;
      display: flex; 
      align-items: center; 
      justify-content: flex-start;
      overflow-x: auto; 
      gap: 25px;
      padding: 0 50px;
      z-index: 90;
      scrollbar-width: none;
      /* Curved mask effect */
      -webkit-mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent);
    }
    #jewelry-options::-webkit-scrollbar { display: none; }

    #jewelry-options img, .thumb-btn {
      min-width: 110px !important;
      height: 110px !important;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
      border-radius: 50%;
      object-fit: contain;
      padding: 15px;
      cursor: pointer;
      transition: 0.4s;
      /* Gravity effect: slight float animation */
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    #jewelry-options img:hover {
      transform: scale(1.3) rotate(10deg);
      background: radial-gradient(circle, rgba(255,215,0,0.3) 0%, transparent 70%);
    }

    /* Minimalist AI */
    #ai-concierge-container {
      position: fixed; bottom: 20px; right: 20px; z-index: 110;
    }
    #ai-avatar {
      width: 45px; height: 45px;
      background: #000; border: 1px solid var(--accent-gold);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 15px var(--accent-gold);
    }

  </style>
</head>
<body>

  <div id="app">
    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <video id="remote-video" autoplay playsinline></video>
    </div>

    <div id="dock">
      <div class="cat active" onclick="handleGravityClick('earrings', this)">
          <div class="icon" style="font-size: 22px;">💎</div><span>Earrings</span>
      </div>
      <div class="cat" onclick="handleGravityClick('chains', this)">
          <div class="icon" style="font-size: 22px;">⛓️</div><span>Chains</span>
      </div>
      <div class="cat" onclick="handleGravityClick('rings', this)">
          <div class="icon" style="font-size: 22px;">💍</div><span>Rings</span>
      </div>
      <div class="cat" onclick="handleGravityClick('bangles', this)">
          <div class="icon" style="font-size: 22px;">✨</div><span>Bangles</span>
      </div>
    </div>

    <div id="jewelry-options"></div>

    <div id="ai-concierge-container">
        <div id="ai-avatar" onclick="toggleConciergeMute()">⭐</div>
    </div>
  </div>

  <script src="core.js"></script>

  <script>
    function handleGravityClick(type, element) {
        // Orb Transition
        document.querySelectorAll('.cat').forEach(nav => nav.classList.remove('active'));
        element.classList.add('active');

        // Logic call to your core.js
        if (typeof selectJewelryType === "function") {
            selectJewelryType(type);
        } else if (typeof filterJewelry === "function") {
            filterJewelry(type);
        }
    }

    window.addEventListener('load', () => {
        setTimeout(() => {
            const activeBtn = document.querySelector('.cat.active');
            if (activeBtn) handleGravityClick('earrings', activeBtn);
        }, 1200);
    });
  </script>
</body>
</html>
