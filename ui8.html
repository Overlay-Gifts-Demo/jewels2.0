<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>JEWELS·AI — Virtual Atelier</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <style>
    :root {
      --gold:        #C9A84C;
      --gold-light:  #E8D08A;
      --gold-dim:    #7A6030;
      --ivory:       #F5F0E8;
      --obsidian:    #0A090C;
      --smoke:       rgba(255,255,255,0.06);
      --smoke-mid:   rgba(255,255,255,0.10);
      --smoke-edge:  rgba(255,255,255,0.18);
      --shadow-deep: rgba(0,0,0,0.85);
      --r: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--obsidian);
      color: var(--ivory);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
    }

    /* ── GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 999; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
    }

    /* ── LIVE CAMERA ── */
    #video-container {
      position: fixed; inset: 0; z-index: 0;
    }
    #video-container video,
    #video-container canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Vignette on camera */
    #video-container::after {
      content: '';
      position: absolute; inset: 0; z-index: 2;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.72) 100%);
      pointer-events: none;
    }

    /* ── HEADER LOGO BAR ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 32px 0;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 22px;
      letter-spacing: 0.25em;
      color: var(--ivory);
      text-transform: uppercase;
    }
    .logo em {
      font-style: italic;
      color: var(--gold);
    }

    .logo-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--gold);
      margin: 0 2px 3px;
      vertical-align: middle;
    }

    .header-actions {
      display: flex; align-items: center; gap: 14px;
    }

    .icon-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--smoke);
      border: 0.5px solid var(--smoke-edge);
      backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s;
      color: rgba(255,255,255,0.65);
      font-size: 14px;
    }
    .icon-btn:hover { background: var(--smoke-mid); border-color: var(--gold-dim); color: var(--gold-light); }

    /* ── CATEGORY PILLS ── */
    #category-bar {
      position: fixed; top: 72px; left: 50%; transform: translateX(-50%);
      z-index: 200;
      display: flex; align-items: center; gap: 8px;
      background: rgba(10,9,12,0.55);
      backdrop-filter: blur(30px) saturate(1.4);
      border: 0.5px solid var(--smoke-edge);
      border-radius: 40px;
      padding: 6px 8px;
    }

    .pill {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 18px;
      border-radius: 30px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: all 0.35s ease;
      white-space: nowrap;
    }

    .pill svg { opacity: 0.55; transition: opacity 0.35s; flex-shrink: 0; }

    .pill:hover {
      color: var(--ivory);
      background: var(--smoke);
    }
    .pill:hover svg { opacity: 0.9; }

    .pill.active {
      background: linear-gradient(135deg, var(--gold-dim) 0%, var(--gold) 60%, var(--gold-light) 100%);
      color: var(--obsidian);
      font-weight: 500;
      box-shadow: 0 4px 24px rgba(201,168,76,0.35);
    }
    .pill.active svg { opacity: 1; filter: brightness(0); }

    /* ── JEWELRY TRAY ── */
    #tray-wrapper {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 190;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* Glass shelf */
    #tray-shelf {
      margin: 0 20px 18px;
      background: rgba(10,9,12,0.5);
      backdrop-filter: blur(40px) saturate(1.6);
      border: 0.5px solid var(--smoke-edge);
      border-radius: 24px;
      padding: 18px 0 14px;
      overflow: hidden;
    }

    #tray-label {
      padding: 0 24px 12px;
      display: flex; align-items: baseline; gap: 10px;
    }

    #tray-label .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 17px;
      letter-spacing: 0.06em;
      color: var(--ivory);
    }

    #tray-label .section-count {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    #jewelry-scroll {
      display: flex;
      gap: 0;
      overflow-x: auto;
      padding: 0 20px;
      scrollbar-width: none;
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 8%, black 92%, transparent 100%);
    }
    #jewelry-scroll::-webkit-scrollbar { display: none; }

    .jewel-card {
      flex-shrink: 0;
      width: 100px;
      display: flex; flex-direction: column; align-items: center;
      gap: 8px;
      padding: 8px 10px;
      cursor: pointer;
      border-radius: 16px;
      transition: background 0.3s;
      position: relative;
    }
    .jewel-card:hover { background: var(--smoke); }
    .jewel-card.selected { background: rgba(201,168,76,0.08); }
    .jewel-card.selected::before {
      content: '';
      position: absolute; top: 6px; right: 12px;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold);
    }

    .jewel-img-wrap {
      width: 76px; height: 76px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      border: 0.5px solid var(--smoke-edge);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      position: relative;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .jewel-card:hover .jewel-img-wrap,
    .jewel-card.selected .jewel-img-wrap {
      border-color: var(--gold-dim);
      box-shadow: 0 0 20px rgba(201,168,76,0.2);
    }

    .jewel-img-wrap img {
      width: 62px; height: 62px;
      object-fit: contain;
      animation: levitate 4s ease-in-out infinite;
    }
    .jewel-card:nth-child(2) .jewel-img-wrap img { animation-delay: -0.7s; }
    .jewel-card:nth-child(3) .jewel-img-wrap img { animation-delay: -1.4s; }
    .jewel-card:nth-child(4) .jewel-img-wrap img { animation-delay: -2.1s; }
    .jewel-card:nth-child(5) .jewel-img-wrap img { animation-delay: -2.8s; }

    @keyframes levitate {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    .jewel-name {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-align: center;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      line-height: 1.3;
    }
    .jewel-card.selected .jewel-name { color: var(--gold-light); }

    .jewel-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    /* ── BOTTOM ACTION ROW ── */
    #action-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px 2px;
      margin-top: 4px;
    }

    .try-btn {
      flex: 1;
      height: 44px;
      background: linear-gradient(135deg, #8A6820 0%, var(--gold) 50%, var(--gold-light) 100%);
      border: none;
      border-radius: 12px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--obsidian);
      cursor: pointer;
      transition: opacity 0.25s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .try-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.12) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    .try-btn:hover::after { transform: translateX(100%); }
    .try-btn:active { transform: scale(0.98); opacity: 0.9; }

    .save-btn {
      width: 44px; height: 44px;
      background: var(--smoke);
      border: 0.5px solid var(--smoke-edge);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      margin-left: 10px;
      transition: background 0.25s, border-color 0.25s;
      color: rgba(255,255,255,0.5);
      flex-shrink: 0;
    }
    .save-btn:hover { background: var(--smoke-mid); border-color: var(--gold-dim); color: var(--gold-light); }

    /* ── AI CONCIERGE BUBBLE ── */
    #concierge {
      position: fixed; left: 28px; bottom: 200px; z-index: 300;
    }

    #concierge-orb {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: var(--obsidian);
      border: 1px solid var(--gold-dim);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: border-color 0.3s, box-shadow 0.3s;
      position: relative;
    }
    #concierge-orb:hover {
      border-color: var(--gold);
      box-shadow: 0 0 18px rgba(201,168,76,0.4);
    }
    #concierge-orb .pulse-ring {
      position: absolute; inset: -4px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.3);
      animation: pulse-ring 2.5s ease-out infinite;
    }
    @keyframes pulse-ring {
      0%   { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    #concierge-orb svg { width: 20px; height: 20px; }

    #concierge-tooltip {
      position: absolute;
      left: 58px; top: 50%; transform: translateY(-50%);
      background: rgba(10,9,12,0.9);
      backdrop-filter: blur(20px);
      border: 0.5px solid var(--smoke-edge);
      border-radius: 10px;
      padding: 8px 14px;
      white-space: nowrap;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #concierge:hover #concierge-tooltip { opacity: 1; }

    /* ── SCAN LINE ANIMATION on camera ── */
    #scan-line {
      position: fixed; left: 0; right: 0; z-index: 10;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      opacity: 0.4;
      animation: scan 5s linear infinite;
      pointer-events: none;
    }
    @keyframes scan {
      0%   { top: 20%; opacity: 0; }
      5%   { opacity: 0.4; }
      95%  { opacity: 0.4; }
      100% { top: 80%; opacity: 0; }
    }

    /* ── CORNER BRACKETS ── */
    .corner {
      position: fixed; z-index: 15; pointer-events: none;
      width: 28px; height: 28px;
    }
    .corner svg { width: 100%; height: 100%; }
    .corner.tl { top: 110px; left: 22px; }
    .corner.tr { top: 110px; right: 22px; transform: scaleX(-1); }
    .corner.bl { bottom: 240px; left: 22px; transform: scaleY(-1); }
    .corner.br { bottom: 240px; right: 22px; transform: scale(-1,-1); }

    /* ── AR MEASUREMENT TAG ── */
    #ar-tag {
      position: fixed; top: 50%; right: 22px;
      transform: translateY(-50%);
      z-index: 50;
      display: flex; flex-direction: column; gap: 8px;
    }
    .ar-metric {
      background: rgba(10,9,12,0.6);
      backdrop-filter: blur(20px);
      border: 0.5px solid var(--smoke-edge);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      text-align: right;
      min-width: 70px;
    }
    .ar-metric strong {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--gold-light);
      letter-spacing: 0.04em;
    }

    /* ── ENTRANCE ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #header       { animation: fadeUp 0.6s ease 0.1s both; }
    #category-bar { animation: fadeUp 0.6s ease 0.25s both; }
    #tray-wrapper { animation: fadeUp 0.6s ease 0.4s both; }
    #concierge    { animation: fadeUp 0.6s ease 0.55s both; }
    #ar-tag       { animation: fadeUp 0.6s ease 0.45s both; }
  </style>
</head>
<body>

  <!-- CAMERA FEED -->
  <div id="video-container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <video id="remote-video" autoplay playsinline style="display:none;"></video>
  </div>

  <!-- SCAN LINE -->
  <div id="scan-line"></div>

  <!-- CORNER BRACKETS -->
  <div class="corner tl">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 14V2H14" stroke="#C9A84C" stroke-width="1" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="corner tr">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 14V2H14" stroke="#C9A84C" stroke-width="1" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="corner bl">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 14V2H14" stroke="#C9A84C" stroke-width="1" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="corner br">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 14V2H14" stroke="#C9A84C" stroke-width="1" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- HEADER -->
  <div id="header">
    <div class="logo">
      <em>Jewels</em><span class="logo-dot"></span>AI
    </div>
    <div class="header-actions">
      <div class="icon-btn" title="Share">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
      </div>
      <div class="icon-btn" title="Wishlist">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- CATEGORY BAR -->
  <div id="category-bar">
    <div class="pill active" onclick="switchCategory('earrings', this)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M12 12v8M9 17l3 3 3-3"/></svg>
      Earrings
    </div>
    <div class="pill" onclick="switchCategory('chains', this)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      Chains
    </div>
    <div class="pill" onclick="switchCategory('rings', this)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg>
      Rings
    </div>
    <div class="pill" onclick="switchCategory('bangles', this)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 9 9"/></svg>
      Bangles
    </div>
  </div>

  <!-- AR SIDE TAG -->
  <div id="ar-tag">
    <div class="ar-metric">
      Face
      <strong id="ar-fit">Oval</strong>
    </div>
    <div class="ar-metric">
      Tone
      <strong id="ar-tone">Warm</strong>
    </div>
    <div class="ar-metric">
      Match
      <strong id="ar-match">98%</strong>
    </div>
  </div>

  <!-- JEWELRY TRAY -->
  <div id="tray-wrapper">
    <div id="tray-shelf">
      <div id="tray-label">
        <span class="section-title">Diamond Collection</span>
        <span class="section-count" id="tray-count">12 pieces</span>
      </div>

      <div id="jewelry-scroll">
        <!-- Earrings -->
        <div class="jewel-card selected" onclick="selectJewel(this, 'Stud')">
          <div class="jewel-img-wrap">
            <img src="https://placehold.co/62x62/1a1612/C9A84C?text=◆&font=serif" alt="Diamond Studs" />
          </div>
          <div class="jewel-name">Diamond<br>Studs</div>
          <div class="jewel-price">₹45,000</div>
        </div>
        <div class="jewel-card" onclick="selectJewel(this, 'Drop')">
          <div class="jewel-img-wrap">
            <img src="https://placehold.co/62x62/1a1612/E8D08A?text=❖&font=serif" alt="Gold Drops" />
          </div>
          <div class="jewel-name">Gold<br>Drops</div>
          <div class="jewel-price">₹62,000</div>
        </div>
        <div class="jewel-card" onclick="selectJewel(this, 'Hoop')">
          <div class="jewel-img-wrap">
            <img src="https://placehold.co/62x62/1a1612/9A7F4A?text=○&font=serif" alt="Hoop Set" />
          </div>
          <div class="jewel-name">Hoop<br>Set</div>
          <div class="jewel-price">₹38,500</div>
        </div>
        <div class="jewel-card" onclick="selectJewel(this, 'Chandbali')">
          <div class="jewel-img-wrap">
            <img src="https://placehold.co/62x62/1a1612/C9A84C?text=✦&font=serif" alt="Chandbali" />
          </div>
          <div class="jewel-name">Chandbali<br>Classic</div>
          <div class="jewel-price">₹95,000</div>
        </div>
        <div class="jewel-card" onclick="selectJewel(this, 'Jhumka')">
          <div class="jewel-img-wrap">
            <img src="https://placehold.co/62x62/1a1612/E8D08A?text=✿&font=serif" alt="Jhumka" />
          </div>
          <div class="jewel-name">Gold<br>Jhumka</div>
          <div class="jewel-price">₹72,000</div>
        </div>
        <div class="jewel-card" onclick="selectJewel(this, 'Cluster')">
          <div class="jewel-img-wrap">
            <img src="https://placehold.co/62x62/1a1612/9A7F4A?text=✶&font=serif" alt="Cluster" />
          </div>
          <div class="jewel-name">Star<br>Cluster</div>
          <div class="jewel-price">₹1,10,000</div>
        </div>
      </div>

      <div id="action-row">
        <button class="try-btn" onclick="tryOn()">Try On Now</button>
        <div class="save-btn" title="Save look">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- AI CONCIERGE -->
  <div id="concierge">
    <div id="concierge-orb" onclick="toggleConcierge()">
      <div class="pulse-ring"></div>
      <svg viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 0v4m0 16v-4m10-6h-4M6 12H2"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>
    <div id="concierge-tooltip">AI Stylist — tap to ask</div>
  </div>

  <script src="core.js"></script>

  <script>
    function switchCategory(type, el) {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      const titles = {
        earrings: 'Diamond Collection',
        chains:   'Gold Chains',
        rings:    'Solitaire Rings',
        bangles:  'Bangle Sets'
      };
      const counts = { earrings: '12 pieces', chains: '8 pieces', rings: '15 pieces', bangles: '6 pieces' };
      document.querySelector('.section-title').textContent = titles[type] || '';
      document.getElementById('tray-count').textContent = counts[type] || '';
      if (typeof selectJewelryType === 'function') selectJewelryType(type);
      else if (typeof filterJewelry === 'function') filterJewelry(type);
    }

    function selectJewel(card, name) {
      document.querySelectorAll('.jewel-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
    }

    function tryOn() {
      if (typeof applyTryOn === 'function') applyTryOn();
    }

    function toggleConcierge() {
      if (typeof toggleConciergeMute === 'function') toggleConciergeMute();
    }

    window.addEventListener('load', () => {
      setTimeout(() => {
        const active = document.querySelector('.pill.active');
        if (active) switchCategory('earrings', active);
      }, 800);
    });
  </script>
</body>
</html>
