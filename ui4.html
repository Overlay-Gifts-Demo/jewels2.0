<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JEWELS-AI | Gold-Chic Try-On</title>
  
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    :root {
      --luxury-gold: #D4AF37;
      --deep-bg: #0a0a0c;
      --accent-gradient: linear-gradient(135deg, #FFD700 0%, #B8860B 100%);
    }

    body, html {
      margin: 0; padding: 0;
      background: var(--deep-bg);
      color: #fff; font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden; height: 100vh;
    }

    #video-container { position: fixed; inset: 0; z-index: 0; background: #000; }
    video, canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    #webcam { transform: scaleX(-1); }

    #dock {
      position: fixed; left: 20px; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column;
      gap: 15px; z-index: 20;
    }

    .cat {
      width: 50px; height: 50px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; cursor: pointer;
      font-size: 10px; text-transform: uppercase;
      writing-mode: vertical-rl; text-orientation: mixed;
      transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      letter-spacing: 1px; color: #888;
    }

    .cat.active {
      height: 100px;
      background: var(--accent-gradient);
      color: #000; font-weight: 800;
      border-color: var(--luxury-gold);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
    }

    #jewelry-options {
      position: fixed; bottom: 40px; left: 90px; right: 20px;
      height: 120px; display: flex; align-items: flex-end;
      overflow-x: auto; gap: 20px; padding: 10px;
      z-index: 15; scrollbar-width: none;
    }
    #jewelry-options::-webkit-scrollbar { display: none; }

    .thumb-btn {
      min-width: 90px; height: 90px;
      background: linear-gradient(145deg, #1a1a1e, #0a0a0c);
      border: 1px solid #333; border-radius: 20px;
      padding: 10px; object-fit: contain;
      cursor: pointer; transition: 0.3s;
    }

    .capture-ring {
      position: fixed; bottom: 40px; right: 40px;
      width: 70px; height: 70px; border-radius: 50%;
      background: var(--accent-gradient);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 25;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
    }
    .capture-ring::after { content: ''; width: 55px; height: 55px; border-radius: 50%; border: 2px solid #000; }

    #loading-status {
      position: absolute; top: 30px; left: 30px;
      font-size: 12px; letter-spacing: 3px; color: var(--luxury-gold);
      text-transform: uppercase; z-index: 10;
    }

    /* PREVIEW MODAL */
    #preview-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.95); z-index: 100;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 20px;
    }
    #preview-image { max-width: 90%; max-height: 65%; border-radius: 15px; border: 2px solid var(--luxury-gold); }
    
    .preview-actions { margin-top: 25px; display: flex; gap: 15px; width: 100%; max-width: 400px; }
    .preview-actions button {
      flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    .btn-dl { background: var(--luxury-gold); color: black; }
    .btn-wa { background: #25D366; color: white; }
    
    .close-preview { position: absolute; top: 30px; right: 30px; font-size: 40px; cursor: pointer; color: var(--luxury-gold); }
    #flash-overlay { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 999; }
  </style>
</head>
<body>

  <div id="app">
    <div id="flash-overlay"></div>
    <div id="loading-status">System.Ready</div>

    <div id="video-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <video id="remote-video" autoplay playsinline></video>
    </div>

    <div id="dock">
      <div class="cat active" onclick="selectJewelryType('earrings', this)">Earrings</div>
      <div class="cat" onclick="selectJewelryType('chains', this)">Chains</div>
      <div class="cat" onclick="selectJewelryType('rings', this)">Rings</div>
      <div class="cat" onclick="selectJewelryType('bangles', this)">Bangles</div>
    </div>

    <div id="jewelry-options"></div>

    <div class="capture-ring" onclick="processSnapshot()"></div>

    <div id="preview-modal">
        <span class="close-preview" onclick="closePreview()">&times;</span>
        <img id="preview-image" src="">
        <div class="preview-actions">
            <button class="btn-dl" onclick="downloadBakedImage()">📥 DOWNLOAD</button>
            <button class="btn-wa" onclick="shareToWhatsApp()">🟢 WHATSAPP</button>
        </div>
    </div>
  </div>

  <script src="core.js"></script>
  <script>
    // 1. Process Snapshot: Merges Video + AR + Branding
    function processSnapshot() {
        const flash = document.getElementById('flash-overlay');
        flash.style.opacity = '1';
        setTimeout(() => flash.style.opacity = '0', 150);

        const video = document.getElementById('webcam');
        const overlay = document.getElementById('overlay');
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth || 1280;
        canvas.height = video.videoHeight || 720;

        // Draw User (Mirrored)
        ctx.save();
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.restore();

        // Draw AR Jewelry
        ctx.drawImage(overlay, 0, 0, canvas.width, canvas.height);

        // Bake Description Box
        const fileName = window.currentJewelry ? window.currentJewelry.split('/').pop().split('.')[0] : "Product_Selection";
        const boxH = 120;
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0, canvas.height - boxH, canvas.width, boxH);
        ctx.strokeStyle = "#D4AF37";
        ctx.lineWidth = 4;
        ctx.strokeRect(0, canvas.height - boxH, canvas.width, boxH);

        ctx.fillStyle = "#D4AF37";
        ctx.font = "bold 32px Arial";
        ctx.fillText("Product Description", 40, canvas.height - 70);
        ctx.fillStyle = "white";
        ctx.font = "24px Arial";
        ctx.fillText("Item: " + fileName, 40, canvas.height - 30);

        document.getElementById('preview-image').src = canvas.toDataURL("image/png");
        document.getElementById('preview-modal').style.display = 'flex';
    }

    function closePreview() { document.getElementById('preview-modal').style.display = 'none'; }

    function downloadBakedImage() {
        const link = document.createElement('a');
        link.download = "Jewels_AI_Look.png";
        link.href = document.getElementById('preview-image').src;
        link.click();
    }

    async function shareToWhatsApp() {
        const dataUrl = document.getElementById('preview-image').src;
        const blob = await (await fetch(dataUrl)).blob();
        const file = new File([blob], 'my_look.png', { type: 'image/png' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
                files: [file],
                title: 'Jewels AI',
                text: 'Check out my jewelry look! ✨'
            });
        } else {
            // Fallback for Desktop
            window.open(`https://wa.me/919743600311?text=${encodeURIComponent("Check out my Jewels AI look!")}`, '_blank');
        }
    }
  </script>
</body>
</html>
